name: 저녁 Obsidian 동기화 (22:00 KST)

on:
  schedule:
    # 매일 13:00 UTC = 22:00 KST
    - cron: "0 13 * * *"
  workflow_dispatch: # 수동 실행 허용

jobs:
  evening-sync:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 저녁 동기화 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python evening_sync.py

      # GitHub Actions는 로컬 Obsidian vault에 접근 불가 → 결과를 아티팩트로 저장
      # 실제 Obsidian 기록은 로컬 맥북에서 실행하거나, iCloud Drive를 통한 별도 방법 필요
      # (자세한 내용은 README.md의 "저녁 동기화 주의사항" 참고)
