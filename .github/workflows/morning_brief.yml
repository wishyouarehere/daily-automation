name: 아침 브리핑 (06:30 KST)

on:
  # 2026-06-30: 정시성·예측가능성 위해 집맥 launchd(com.jay.morning-brief, 06:30)로 이전.
  # 스케줄 비활성. 클라우드 폴백이 필요하면 아래 schedule 주석 해제(GH_PAT secret으로 GitHub 모드 동작).
  # schedule:
  #   - cron: "30 21 * * *"   # 21:30 UTC = 06:30 KST
  workflow_dispatch:

jobs:
  morning-brief:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 아침 브리핑 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python morning_brief.py
