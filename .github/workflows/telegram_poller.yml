name: 할일 등록 폴러 (5분)

on:
  schedule:
    # 5분마다 (GitHub Actions 특성상 실제로는 더 지연될 수 있음)
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: telegram-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 폴러 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python telegram_poller.py
